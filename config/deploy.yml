service: zapfe_rails
image: leopoldschmid/zapfe-rails

servers:
  web:
    - 157.180.19.232

proxy:
  hosts:
    - zapfe.jetzt
    - www.zapfe.jetzt
  ssl: true

registry:
  username: leopoldschmid
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
    - RESEND_API_KEY
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: true
    SOLID_QUEUE_IN_PUMA: true
    APP_HOST: zapfe.jetzt

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

volumes:
  - "zapfe_rails_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: root
  keys:
    - /home/leo/.ssh/apeServeBeer.pem
