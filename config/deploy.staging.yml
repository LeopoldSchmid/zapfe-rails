# Staging overlay for Kamal.
# Use with:
#   script/kamal_with_env deploy -d staging
#   script/kamal_with_env app logs -d staging

service: zapfe-rails-staging

proxy:
  hosts:
    - staging.zapfe.jetzt
  ssl: true

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: true
    SOLID_QUEUE_IN_PUMA: true
    APP_HOST: staging.zapfe.jetzt

volumes:
  - "zapfe_rails_staging_storage:/rails/storage"
